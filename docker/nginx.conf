events {}

http {

    include       /etc/nginx/mime.types;   # important
    default_type  application/json;
    error_log /var/log/nginx/error.log info;
    server {
        set $authenticate https://127.0.0.1:47777;
        set $compute    https://127.0.0.1:17777;
        set $storage    https://127.0.0.1:27777;
        set $network    https://127.0.0.1:37777;
        set $services   https://127.0.0.1:6777;
        set $targets    https://127.0.0.1:57777;
        set $sidecar    http://127.0.0.1:9999;

        listen 443 ssl;
        listen [::]:443 ssl;

        ssl_certificate /certs/atomos.crt;
        ssl_certificate_key /certs/atomos.key;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;

        root /usr/share/nginx/html;
        index electros/electros.html;

        auth_request /_guard/validate;

        error_page 401 = @unauthorized;
        error_page 403 = @forbidden

        # Sidecar call 
        location = /_guard/validate {
            auth_request off;
            internal;
            proxy_pass              $sidecar/validate;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length   "";
            proxy_set_header        X-Session-Token  $cookie_session_token;
        }

        # static assets
        location / {
          auth_request off;
          try_files $uri $uri/ =404;
        }

        location ~ ^/(.*)/favicon.ico$ {
          auth_request off;
          index electros.iconset/electros.ico;
        }

        # Static asset aliases
        location /js/ {
          auth_request off;
          alias /usr/share/nginx/html/electros/js/;
        }

        location /css/ {
          auth_request off;
          alias /usr/share/nginx/html/electros/css/;
        }

        location /pages/ {
          auth_request off;   
          alias /usr/share/nginx/html/electros/pages/;
        }

        location /assets/ {
          auth_request off;
          alias /usr/share/nginx/html/electros/assets/;
        }

        location /Electros.svg {
          auth_request off;
          alias /usr/share/nginx/html/electros/Electros.svg;
        }

        location /configs/ {
          auth_request off;
          alias /usr/share/nginx/html/electros/configs/;
        }

        location /remotes/ {
          auth_request off;
          alias /usr/share/nginx/html/electros/remotes/;
        }

        location /favicon/ {
          auth_request off;
          alias /usr/share/nginx/html/electros/favicon/;
        }

        location /ecd/ {
          auth_request off;
          alias /usr/share/nginx/html/electros/ecd/;
        }

        location /epm/ {
          auth_request off;
          alias /usr/share/nginx/html/electros/epm/;
        }

        location /ist/ {
          auth_request off;
          alias /usr/share/nginx/html/electros/ist/;
        }

        # Daemon statuses handlers
        location /authStatus {
          auth_request off;
          proxy_pass $authenticate/;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Port $server_port;
        }

        location /computeStatus {
          proxy_pass $compute/;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Port $server_port;
        }

        location /storageStatus {
          proxy_pass $storage/;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Port $server_port;
        }

        location /networksStatus {
          proxy_pass $network/;
          add_header X-debug "$http_authorization" always;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Port $server_port;
        }

        location /servicesStatus {
          proxy_pass $services/;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Port $server_port;
        }

        location /targetsStatus {
          proxy_pass $targets/;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Port $server_port;
        }

        # Login -> sidecar redirect
        location /api/v1/authenticate/login {
          auth_request off;
          proxy_pass $sidecar/login-proxy/api/v1/authenticate/login;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Port $server_port;
          proxy_pass_request_body on;
        }

        location /api/v1/authenticate/local_login {
          auth_request off;
          proxy_pass $sidecar/login-proxy/api/v1/authenticate/local-login;
          error_page
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Port $server_port;
          proxy_pass_request_body on;
        }

        location /api/v1/authenticate/logout {
          auth_request off;
          proxy_pass $sidecar/login-proxy/api/v1/authenticate/logout;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Port $server_port;
          proxy_pass_request_body on;
        }

        # Functions endpoint
        location ~ ^/api/v1/authenticate/(.*)?$ {
          auth_request off;
          proxy_pass $authenticate;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Port $server_port;
          proxy_pass_request_body on;
        }

        location /api/v1.0/client/backups/ {
          proxy_pass $compute;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Port $server_port;
        }

        location /api/v1.0/client/vm/ {
          proxy_pass $compute;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Port $server_port;
        }

        # special case for network attach/detach for a VM
        location ~ ^/api/v1.0/client/network/(attach|detach) {
          proxy_pass $compute;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Port $server_port;
        }

        location /api/v1.0/client/volume/ {
          proxy_pass $storage;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Port $server_port;
        }

        location /api/v1.0/client/network/ {
          proxy_pass $network;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Port $server_port;
        }

        location /api/v1.0/service/ {
          proxy_pass $services;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Port $server_port;
        }

        location /api/v1.0/client/target/ {
          proxy_pass $targets;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Port $server_port;
        } 

        # WebSocket passthrough
        location /api/v1.0/client/vnc/59441 {
          proxy_pass https://127.0.0.1:59441/;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Port $server_port;
        }

        location /api/logs {
          proxy_pass https://localhost:5142;
          proxy_buffering off;
          proxy_cache off;
        }

        # Error pages
        location @unauthorized {
          default_type application/json;
          return 401 '{"error":"unauthorized","message":"No active session"}';
        }

        location @forbidden {
          default_type application/json;
          return 403 '{"error":"forbidden","message":"Forbidden request"}';
        }
    }
}
