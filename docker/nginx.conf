events {}

http {

    include       /etc/nginx/mime.types;   # important
    default_type  application/json;

    server {
        set $authenticate https://127.0.0.1:47777;
        set $compute    https://127.0.0.1:17777;
        set $storage    https://127.0.0.1:27777;
        set $network    https://127.0.0.1:37777;
        set $services   https://127.0.0.1:6777;
        set $targets    https://127.0.0.1:57777;
        set $sidecar    http://127.0.0.1:9999;

        listen 443 ssl;
        listen [::]:443 ssl;

        ssl_certificate /certs/atomos.crt;
        ssl_certificate_key /certs/atomos.key;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;

        root /usr/share/nginx/html;
        index electros/electros.html;

        location = /_guard/validate {
            internal;
            proxy_pass              $sidecar/validate;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length   "";
            proxy_set_header        X-Session-Token  $cookie_session_token;
        }

        location = /_guard/issue {
            internal;
            proxy_pass   $sidecar/issue;
            proxy_method POST;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
        }

        location / {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;
            try_files $uri $uri/ =404;
        }

        location ~ ^/(.*)/favicon.ico$ {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;
            index electros.iconset/electros.ico;
        }

        # Static asset aliases
        location /js/ {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;
            alias /usr/share/nginx/html/electros/js/;
        }

        location /css/ {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;
            alias /usr/share/nginx/html/electros/css/;
        }

        location /pages/ {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;
            alias /usr/share/nginx/html/electros/pages/;
        }

        location /assets/ {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;
            alias /usr/share/nginx/html/electros/assets/;
        }

        location /Electros.svg {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;
            alias /usr/share/nginx/html/electros/Electros.svg;
        }

        location /configs/ {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;
            alias /usr/share/nginx/html/electros/configs/;
        }

        location /remotes/ {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;
            alias /usr/share/nginx/html/electros/remotes/;
        }

        location /favicon/ {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;
            alias /usr/share/nginx/html/electros/favicon/;
        }

        location /ecd/ {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;
            alias /usr/share/nginx/html/electros/ecd/;
        }

        location /epm/ {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;
            alias /usr/share/nginx/html/electros/epm/;
        }

        location /ist/ {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;
            alias /usr/share/nginx/html/electros/ist/;
        }

        # Daemon statuses handlers
        location /authStatus {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;
            proxy_pass $authenticate/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location /computeStatus {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;

            proxy_pass $compute/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location /storageStatus {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;

            proxy_pass $storage/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location /networksStatus {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;

            proxy_pass $network/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location /servicesStatus {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;

            proxy_pass $services/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location /targetsStatus {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;

            proxy_pass $targets/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        # Daemon handlers
        location /api/v1/authenticate/ {
            proxy_pass $sidecar/login-proxy/api/v1/authenticate/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_pass_request_body on;
        }

        location /api/v1.0/client/backups/ {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;

            proxy_pass $compute;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location /api/v1.0/client/vm/ {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;

            proxy_pass $compute;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        # special case for network attach/detach for a VM
        location ~ ^/api/v1.0/client/network/(attach|detach) {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;

            proxy_pass $compute;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location /api/v1.0/client/volume/ {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;

            proxy_pass $storage;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location /api/v1.0/client/network/ {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;

            proxy_pass $network;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location /api/v1.0/service/ {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;

            proxy_pass $services;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location /api/v1.0/client/target/ {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;

            proxy_pass $targets;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        # WebSocket passthrough
        location /api/v1.0/client/vnc/59441 {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;

            proxy_pass https://127.0.0.1:59441/;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location /api/logs {
            auth_request /_guard/validate;
            error_page 401 403 = @unauthorized;

            proxy_pass https://localhost:5142;
            proxy_buffering off;
            proxy_cache off;
        }

        location @unauthorized {
            default_type application/json;
            return 401 '{"error":"unauthorized","message":"No active session"}';
        }
    }
}
